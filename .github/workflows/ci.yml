name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  harness-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run development-harness unit tests
        run: python -m unittest discover skills/development-harness/scripts/tests
